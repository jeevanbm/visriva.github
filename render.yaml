services:
  - name: visriva-upload-service
    github:
      repo: jeevanbm/claude-visriva-shopify-
      branch: main
    type: web
    buildCommand: npm install
    startCommand: node server/visriva-drive-upload.js
    plan: free
    regions:
      - oregon
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DRIVE_FOLDER_ID
        value: 0AFbUKkWBimP5Uk9PVA
      - key: GOOGLE_SERVICE_ACCOUNT
        sync: false
        # Add your service account JSON in Render dashboard environment variables