services:
  - name: visriva-upload-service
    github:
      repo: jeevanbm/claude-visriva-shopify-
      branch: main
    buildCommand: npm install
    startCommand: node server/visriva-drive-upload.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # NOTE: Add these env vars in Render Dashboard > Environment > Secrets
      # GOOGLE_SERVICE_ACCOUNT: (paste entire service account JSON from config file)
      # DRIVE_FOLDER_ID: 0AFbUKkWBimP5Uk9PVA